<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TC Vault | Trading Card Portfolio</title>
    <meta name="description" content="The ultimate AI-powered tool for trading card collectors. Identify, track, and value your portfolio with precision.">
    
    <script>
        // System Health Watchdog
        window.V_START_TIME = Date.now();
        window.addEventListener('load', () => {
            const root = document.getElementById('root');
            const checkHealth = () => {
                const isMounted = root && root.children.length > 0;
                const timeElapsed = Date.now() - window.V_START_TIME;

                if (!isMounted && timeElapsed > 6000) {
                    console.error('Vault: Critical Boot Failure detected.');
                    const recovery = document.createElement('div');
                    recovery.id = 'vault-access-failure-marker';
                    recovery.innerHTML = `
                        <div style="position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;font-family:sans-serif;padding:40px;text-align:center;z-index:999999;background-image:radial-gradient(circle at center, #0f172a 0%, #000 100%);">
                            <div style="margin-bottom:30px;opacity:0.5;">
                                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
                            </div>
                            <h2 style="font-weight:900;text-transform:uppercase;font-style:italic;margin-bottom:12px;letter-spacing:-0.5px;font-size:24px;">Connection Interrupted</h2>
                            <p style="color:#64748b;font-size:14px;max-width:320px;margin-bottom:40px;line-height:1.6;font-weight:500;">The local development server refused the connection or the application failed to initialize in time.</p>
                            <div style="display:flex;gap:12px;flex-direction:column;width:100%;max-width:280px;">
                                <button onclick="location.reload();" style="background:#3b82f6;color:#fff;border:none;padding:16px;border-radius:14px;font-weight:800;cursor:pointer;text-transform:uppercase;font-size:12px;letter-spacing:1px;box-shadow:0 10px 20px -5px rgba(59,130,246,0.4);">Re-establish Connection</button>
                                <button onclick="localStorage.clear();location.reload();" style="background:transparent;color:#475569;border:1px solid #1e293b;padding:14px;border-radius:14px;font-weight:700;cursor:pointer;text-transform:uppercase;font-size:11px;letter-spacing:0.5px;">Hard Reset Cache</button>
                            </div>
                            <div style="margin-top:40px;font-size:10px;color:#334155;font-weight:800;text-transform:uppercase;letter-spacing:2px;">Diagnostic: Error 502 / Connection Refused</div>
                        </div>
                    `;
                    if (!document.getElementById('vault-access-failure-marker')) {
                        document.body.appendChild(recovery);
                    }
                } else if (!isMounted) {
                    setTimeout(checkHealth, 1000);
                }
            };
            checkHealth();
        });
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --text-label: 10px;
            --text-body: 14px;
            --text-header: 32px;
            --text-display: 48px;
            --radius-xl: 12px;
            --radius-2xl: 16px;
            --radius-3xl: 24px;
            --transition-fast: 150ms ease-out;
            --transition-medium: 300ms ease-in-out;
            --transition-slow: 500ms ease-in-out;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #000000;
            color: #f1f5f9;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow: hidden;
            font-size: var(--text-body);
        }
        
        .grain {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("https://grainy-gradients.vercel.app/noise.svg");
            opacity: 0.12; pointer-events: none; z-index: 9999;
            filter: contrast(170%) brightness(100%);
        }

        .glass {
            background: rgba(4, 7, 12, 0.9);
            backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .glass-subtle {
            background: rgba(4, 7, 12, 0.6);
            backdrop-filter: blur(20px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .tabular {
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.03em;
        }

        /* Button Variants */
        .btn-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 48px;
            padding: 0 24px;
            background-color: #2563eb;
            color: white;
            border-radius: var(--radius-xl);
            font-weight: 900;
            font-size: var(--text-body);
            transition: all var(--transition-fast);
            box-shadow: 0 20px 25px -5px rgba(37, 99, 235, 0.2);
        }
        .btn-primary:hover:not(:disabled) {
            background-color: #3b82f6;
            transform: translateY(-1px);
        }
        .btn-primary:active:not(:disabled) {
            transform: scale(0.97);
            filter: brightness(0.9);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 48px;
            padding: 0 24px;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: var(--radius-xl);
            font-weight: 600;
            font-size: var(--text-body);
            transition: all var(--transition-fast);
        }
        .btn-secondary:hover:not(:disabled) {
            background-color: rgba(255, 255, 255, 0.1);
        }
        .btn-secondary:active:not(:disabled) {
            transform: scale(0.97);
            filter: brightness(0.9);
        }

        .btn-tertiary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            font-weight: 600;
            font-size: var(--text-body);
            transition: all var(--transition-fast);
        }
        .btn-tertiary:hover {
            color: white;
        }
        .btn-tertiary:active {
            transform: scale(0.97);
        }

        /* Global Focus Style */
        *:focus-visible {
            outline: none;
            ring: 2px solid #2563eb;
            ring-offset: 2px;
            ring-offset-color: black;
        }

        /* Image Loading Skeleton Effect */
        .img-loading::before {
            content: '';
            position: absolute;
            inset: 0;
            background-color: rgba(15, 23, 42, 0.5);
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            z-index: 1;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #2563eb; }
        
        @keyframes scan {
            0% { top: 0%; opacity: 0.4; }
            50% { opacity: 1; }
            100% { top: 100%; opacity: 0.4; }
        }
        .scanner-line {
            height: 4px;
            background: linear-gradient(90deg, transparent, #3b82f6, #93c5fd, #3b82f6, transparent);
            box-shadow: 0 0 25px #3b82f6, 0 0 50px rgba(59, 130, 246, 0.3);
            animation: scan 2.5s ease-in-out infinite alternate;
            filter: blur(0.5px);
            width: 100%; position: absolute; left: 0; z-index: 40;
        }
        
        @media (max-width: 768px) {
            button { min-height: 44px; }
            input, select { min-height: 44px; }
        }
    </style>
