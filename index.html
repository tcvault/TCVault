<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TC Vault | Professional Card Portfolio</title>
    <meta name="description" content="The ultimate AI-powered suite for high-end trading card collectors. Identify, track, and value your portfolio with precision.">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="TC Vault | AI Portfolio Manager">
    <meta property="og:description" content="Securely track your trading card investments with AI-powered identification and real-time market data.">
    <meta property="og:image" content="https://images.unsplash.com/photo-1611992430488-721102698947?q=80&w=2070&auto=format&fit=crop">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="TC Vault | Pro Collector Suite">
    <meta property="twitter:description" content="Manage your rare card collection like a hedge fund.">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000000;
            color: #f8fafc;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow: hidden;
        }
        .grain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("https://grainy-gradients.vercel.app/noise.svg");
            opacity: 0.12;
            pointer-events: none;
            z-index: 9999;
            filter: contrast(170%) brightness(100%);
        }
        .glass {
            background: rgba(4, 7, 12, 0.85);
            backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }
        .premium-hover {
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .premium-hover:hover {
            transform: translateY(-6px) scale(1.01);
            border-color: rgba(79, 70, 229, 0.5);
            background: rgba(10, 15, 30, 0.9);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.95), 0 0 20px rgba(79, 70, 229, 0.15);
        }
        .tabular {
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.03em;
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 3px;
        }
        ::-webkit-scrollbar-track {
            background: #000;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4f46e5;
        }
        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(400%); }
        }
        .scanner-line {
            height: 4px;
            background: linear-gradient(90deg, transparent, #4f46e5, #818cf8, #4f46e5, transparent);
            box-shadow: 0 0 30px #4f46e5;
            animation: scan 2.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            filter: blur(1px);
        }
        /* Dashboard holographic glow */
        .holo-glow {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(79, 70, 229, 0.15) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }
        .premium-hover:hover .holo-glow {
            opacity: 1;
        }
    </style>
<script type="importmap">

  }
}
</script>
</head>

    <div class="grain"></div>
    <div id="root"></div>
</body>
</html>
